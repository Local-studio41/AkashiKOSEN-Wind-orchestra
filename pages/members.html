<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部員紹介 - 明石高専吹奏楽部</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* info.html と同様の基本レイアウト */
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; }
        main { flex: 1; }

        /* パートごとのカード（eventクラスの構成に準拠） */
        .part-section {
            background: #fff;
            padding: 30px;
            margin-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
        }
        .part-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .part-header h2 {
            margin: 0;
            font-size: 1.6rem;
            color: #a00030;
            border: none;
            padding: 0;
        }
        .part-comment {
            background: #fdf2f4;
            padding: 15px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 20px;
            position: relative;
            border-left: 4px solid #a00030;
        }
        .member-list {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap; /* 管理画面での改行を保持 */
            padding-left: 5px;
        }

        .loading { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>

    <header id="top-bar" class="scrolled">
        <div class="header-left">
            <button id="menu-btn" title="メニュー展開"><i class="fas fa-bars"></i></button>
            <a href="../index.html" class="site-name">明石高専吹奏楽部</a>
        </div>
        <div class="header-right">
            <div id="search-container">
                <input type="text" id="search-input" placeholder="サイト内検索...">
                <button id="search-btn" title="検索"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <div id="side-menu-overlay" class="overlay"></div>
    <aside id="side-menu">
        <nav>
            <ul>
                <li><a href="../info.html"><i class="fas fa-bullhorn"></i> 更新情報</a></li>
                <li><a href="../concert.html"><i class="fas fa-music"></i> 演奏会情報</a></li>
                <li><a href="activity.html"><i class="fas fa-users"></i> 活動紹介</a></li>
                <li><a href="members.html" class="active"><i class="fas fa-user-friends"></i> 部員紹介</a></li>
                <li class="admin-link"><a href="admin/index.html"><i class="fas fa-cog"></i> 運営管理</a></li>
            </ul>
        </nav>
    </aside>

    <main class="sub-page">
        <div class="content-wrapper">
            <h1 style="margin-bottom: 30px;"><i class="fas fa-user-friends"></i> 部員紹介</h1>
            
            <div id="members-feed">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> 読み込み中...</div>
            </div>
        </div>
    </main>

    <footer><p>© 明石工業高等専門学校吹奏楽部 情報宣伝係</p></footer>

    <script src="../js/script.js"></script>
    <script>
        const DATA_URL = "../data/all_data.json";

        const partMap = {
            "1": "Flute", "2": "Clarinet", "3": "Saxophone",
            "4": "Trumpet", "5": "Horn", "6": "Trombone",
            "7": "Euphonium", "8": "Tuba", "9": "Contrabass",
            "10": "Percussion", "11": "Conductor"
        };

        function renderMembers(data) {
            const feed = document.getElementById('members-feed');
            if (!data || data.length < 2) {
                feed.innerHTML = '<p class="loading">部員データがありません。</p>';
                return;
            }

            // data[0]はヘッダー。data[1]以降が各パートのデータ
            const items = data.slice(1);
            let html = '';

            items.forEach(row => {
                const partId = row[0]; // ID (1-11)
                const partName = partMap[partId] || "Other";
                const comment = row[1] || "よろしくお願いします！";
                const details = row[2] || "（部員データ未登録）";

                html += `
                    <section class="part-section">
                        <div class="part-header">
                            <h2>${partName}</h2>
                        </div>
                        <div class="part-comment">
                            ${comment}
                        </div>
                        <div class="member-list">${details}</div>
                    </section>
                `;
            });
            feed.innerHTML = html;
        }

        async function loadMembers() {
            const cached = localStorage.getItem('site_data_cache');
            if (cached) {
                const data = JSON.parse(cached);
                if (data.members) renderMembers(data.members);
            }

            try {
                const response = await fetch(DATA_URL + "?t=" + Date.now());
                const data = await response.json();
                localStorage.setItem('site_data_cache', JSON.stringify(data));
                if (data.members) renderMembers(data.members);
            } catch (e) {
                if (!cached) {
                    document.getElementById('members-feed').innerHTML = '<p class="loading">情報の取得に失敗しました。</p>';
                }
            }
        }

        window.addEventListener('DOMContentLoaded', loadMembers);
    </script>
</body>
</html>
